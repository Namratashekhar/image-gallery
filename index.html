<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        .main-image {
            height: 350px;
            width: 300px;
            border-radius: 10px;
        }

        .gallery-container{
            width: fit-content;
            margin: 10px auto;
             display: flex;
            align-items: center;
        }

        .btn-slide{
            display: flex;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 20px;        
            cursor: pointer;  
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div class="gallery-container">
        <span class="btn-slide btn-left" onclick="slideLeft()"> &lt; </span>

        <img src="./images/Embellished Round Watch - Rose Gold.webp" alt="Image 1" class="main-image" id="mainImage" />

        <span class="btn-slide btn-right" onclick="slideRight()">&gt;</span>
    </div>
    <script>
        const IMAGES = ["./images/Embellished Round Watch - Rose Gold.webp",
            "./images/Fastrack Vyb Halo Quartz Analog Grey Dial Metal Strap Watch.webp",
            "./images/shoppingStyledose Women's Analogue Wrist Watch.webp",
            "./images/Elegant_Butterfly_Charm_Gold_Plated_adjustable_Ladies_Bracelet_Watch_4VOI5Z5OBT_2026-03-11_1.webp",
            "./images/classic trendy stylish watch.jpg",
            "./images/5-2PCS-Set-Watch-for-Women-Luxury-Leather-Analog-Ladies-Quartz-Wrist-Watch-Fashion-Bracelet-Watch-5.jpg_640x640-5.jpg"
        ];

        let currentIndex = 1;

        function showCurrentIndexImage() {
            const imgElement = document.getElementById("mainImage");

            imgElement.src = IMAGES[currentIndex];
        }

        function slideLeft() {
            if(currentIndex > 0) {
            currentIndex--;
            }else{
                currentIndex = IMAGES.length -1;
            }
            showCurrentIndexImage();
        }

        function slideRight() {
            if(currentIndex < IMAGES.length - 1){
                currentIndex++;
            }else{
                currentIndex= 0;
            }

            showCurrentIndexImage();
        }


    </script>

</body>

</html>
